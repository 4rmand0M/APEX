<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex - Comunidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0a0a0a; --fg: #ffffff; --card: #141414; --border: #262626; --primary: #ef4444; }
        body { background: var(--bg); color: var(--fg); font-family: sans-serif; margin: 0; }
        .container { padding: 100px 52px; max-width: 1300px; margin: 0 auto; }
        .badge { border: 1px solid var(--border); color: var(--primary); padding: 4px 12px; border-radius: 99px; font-size: 12px; letter-spacing: 2px; }
        .title { font-family: 'Bebas Neue'; font-size: 72px; margin: 20px 0 40px; line-height: 0.9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .user-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: 0.3s; }
        .user-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .img-container { position: relative; height: 180px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .level-tag { position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; font-size: 9px; padding: 4px 8px; border-radius: 20px; font-weight: bold; }
        .user-info { padding: 15px; }
        .user-info h3 { font-family: 'Bebas Neue'; font-size: 20px; margin: 0 0 10px; }
        .stat { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #a3a3a3; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">DIRECTORIO</span>
        <h1 class="title">COMUNIDAD APEX</h1>
        <div id="grid" class="grid"></div>
    </div>

    <script>
        const users = [
            { id: 1, name: "LAURA MARTE", level: "Avanzado", gym: "Apex Central", favorite: "Peso Muerto", workouts: 156, achievements: 12, image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400" }
        ];

        function render() {
            document.getElementById('grid').innerHTML = users.map(u => `
                <div class="user-card">
                    <div class="img-container">
                        <img src="${u.image}">
                        <span class="level-tag">${u.level}</span>
                    </div>
                    <div class="user-info">
                        <h3>${u.name}</h3>
                        <div class="stat"><i data-lucide="map-pin" style="width:12px; color:var(--primary)"></i> ${u.gym}</div>
                        <div class="stat"><i data-lucide="dumbbell" style="width:12px; color:var(--primary)"></i> ${u.favorite}</div>
                        <div class="stat"><i data-lucide="trophy" style="width:12px; color:var(--primary)"></i> ${u.achievements} logros</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
        render();
    </script>
</body>
</html>
