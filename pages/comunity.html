<!DOCTYPE html>
<html lang="es" data-tema="oscuro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX FITNESS — Comunidad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/workout.css" />
  <style>
    .contenido-comunidad {
      padding: 32px 24px 100px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .cabecera-comunidad {
      margin-bottom: 36px;
    }

    .badge-seccion {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--acento);
      margin-bottom: 12px;
    }

    .badge-seccion::before {
      content: '';
      width: 18px;
      height: 1px;
      background: var(--acento);
      flex-shrink: 0;
    }

    [data-tema="claro"] .badge-seccion {
      color: var(--texto-sub);
    }

    [data-tema="claro"] .badge-seccion::before {
      background: var(--texto-sub);
    }

    .titulo-comunidad {
      font-family: 'Bebas Neue', cursive;
      font-size: 52px;
      letter-spacing: 6px;
      color: var(--texto);
      line-height: 0.9;
      margin-bottom: 10px;
    }

    .subtitulo-comunidad {
      font-size: 14px;
      color: var(--texto-atenuado);
      font-weight: 300;
    }

    .grid-usuarios {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .tarjeta-usuario {
      background: var(--superficie);
      border: 1px solid var(--borde);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .tarjeta-usuario:hover {
      border-color: var(--borde-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .usuario-imagen-wrap {
      position: relative;
      height: 200px;
      overflow: hidden;
    }

    .usuario-imagen-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .usuario-nivel-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--acento);
      color: var(--texto-boton);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 99px;
    }

    [data-tema="claro"] .usuario-nivel-badge {
      background: var(--texto);
      color: var(--fondo);
    }

    .usuario-info {
      padding: 18px;
    }

    .usuario-nombre {
      font-family: 'Bebas Neue', cursive;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--texto);
      margin-bottom: 14px;
      line-height: 1;
    }

    .usuario-stats {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .usuario-stat {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12px;
      color: var(--texto-atenuado);
    }

    .usuario-stat i {
      width: 14px;
      height: 14px;
      stroke-width: 2;
      color: var(--acento);
      flex-shrink: 0;
    }

    [data-tema="claro"] .usuario-stat i {
      color: var(--texto-sub);
    }

    @media (min-width: 820px) {
      .contenido-comunidad {
        padding: 40px 32px 60px;
      }

      .titulo-comunidad {
        font-size: 64px;
      }

      .grid-usuarios {
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
      }
    }
  </style>
</head>
<body>

<div id="cursor-punto" aria-hidden="true"></div>

<div class="contenedor-app" id="app">

  <!-- SIDEBAR DESKTOP -->
  <aside class="barra-lateral" role="navigation" aria-label="Navegación principal">
    <a href="#" class="logo-barra" aria-label="APEX FITNESS">
      <svg width="26" height="26" viewBox="0 0 42 42" fill="none">
        <rect x="3"  y="18" width="5"  height="6"  rx="1.5" stroke="currentColor" stroke-width="1.8"/>
        <rect x="34" y="18" width="5"  height="6"  rx="1.5" stroke="currentColor" stroke-width="1.8"/>
        <rect x="8"  y="15" width="4"  height="12" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
        <rect x="30" y="15" width="4"  height="12" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
        <line x1="12" y1="21" x2="30" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="logo-texto">APEX</span>
    </a>
    <nav class="nav-principal">
      <ul class="lista-nav" role="list">
        <li><a href="workout.html"    class="enlace-nav"><i data-lucide="dumbbell"></i><span>Workout</span></a></li>
        <li><a href="calendario.html" class="enlace-nav"><i data-lucide="calendar"></i><span>Calendario</span></a></li>
        <li><a href="ejercicios.html" class="enlace-nav"><i data-lucide="layers"></i><span>Ejercicios</span></a></li>
        <li><a href="perfil.html"     class="enlace-nav"><i data-lucide="user"></i><span>Perfil</span></a></li>
        <li><a href="entrenadores.html" class="enlace-nav"><i data-lucide="users"></i><span>Entrenadores</span></a></li>
        <li><a href="gyms.html" class="enlace-nav"><i data-lucide="map-pin"></i><span>Gimnasios</span></a></li>
        <li><a href="comunity.html" class="enlace-nav activo" aria-current="page"><i data-lucide="globe"></i><span>Comunidad</span></a></li>
      </ul>
    </nav>
    <div class="nav-inferior">
      <div class="botones-legales">
        <button class="boton-tema" id="boton-tema" aria-label="Cambiar tema">
          <i data-lucide="sun"  class="icono-tema icono-claro"></i>
          <i data-lucide="moon" class="icono-tema icono-oscuro"></i>
        </button>
        <a href="privacidad.html" class="boton-legal" aria-label="Privacidad" title="Privacidad">
          <i data-lucide="shield" class="icono-legal"></i>
        </a>
        <a href="terminos.html" class="boton-legal" aria-label="Términos y Condiciones" title="Términos">
          <i data-lucide="file-text" class="icono-legal"></i>
        </a>
      </div>
      <hr class="separador-nav"/>
      <a href="#" class="usuario-barra">
        <div class="avatar-barra">J</div>
        <div class="info-usuario-barra">
          <span class="nombre-usuario-barra">Jeremy Infante</span>
          <span class="handle-usuario-barra">@jeremyinfante</span>
        </div>
        <i data-lucide="log-out" class="icono-logout"></i>
      </a>
    </div>
  </aside>

  <!-- CONTENIDO -->
  <div class="area-contenido">
    <main class="contenido-comunidad" role="main">
      
      <header class="cabecera-comunidad">
        <span class="badge-seccion">DIRECTORIO</span>
        <h1 class="titulo-comunidad">COMUNIDAD APEX</h1>
        <p class="subtitulo-comunidad">Conecta con otros atletas y comparte tu progreso</p>
      </header>

      <div id="grid-usuarios" class="grid-usuarios"></div>

    </main>
  </div>

  <!-- NAV MÓVIL -->
  <nav class="nav-movil" aria-label="Navegación móvil">
    <a href="workout.html" class="enlace-nav-movil" aria-label="Workout">
      <i data-lucide="home"></i><span>Workout</span>
    </a>
    <a href="calendario.html" class="enlace-nav-movil" aria-label="Calendario">
      <i data-lucide="clipboard-list"></i><span>Calendario</span>
    </a>
    <button class="enlace-nav-movil enlace-nav-movil-central" aria-label="Nuevo entreno">
      <i data-lucide="plus"></i>
    </button>
    <a href="ejercicios.html" class="enlace-nav-movil" aria-label="Ejercicios">
      <i data-lucide="dumbbell"></i><span>Ejercicios</span>
    </a>
    <a href="#" class="enlace-nav-movil activo" aria-current="page" aria-label="Comunidad">
      <i data-lucide="globe"></i><span>Comunidad</span>
    </a>
  </nav>

</div>

<script>
const users = [
  { id: 1, name: "LAURA MARTE", level: "Avanzado", gym: "Apex Central", favorite: "Peso Muerto", workouts: 156, achievements: 12, image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400" },
  { id: 2, name: "CARLOS RUIZ", level: "Intermedio", gym: "Apex Norte", favorite: "Sentadilla", workouts: 89, achievements: 8, image: "https://images.unsplash.com/photo-1568602471122-7832951cc4c5?w=400" },
  { id: 3, name: "MARÍA LÓPEZ", level: "Principiante", gym: "Apex Sur", favorite: "Press Banca", workouts: 34, achievements: 3, image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400" },
  { id: 4, name: "JUAN PÉREZ", level: "Avanzado", gym: "Apex Central", favorite: "Dominadas", workouts: 201, achievements: 15, image: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400" }
];

function render() {
  document.getElementById('grid-usuarios').innerHTML = users.map(u => `
    <article class="tarjeta-usuario">
      <div class="usuario-imagen-wrap">
        <img src="${u.image}" alt="${u.name}">
        <span class="usuario-nivel-badge">${u.level}</span>
      </div>
      <div class="usuario-info">
        <h3 class="usuario-nombre">${u.name}</h3>
        <div class="usuario-stats">
          <div class="usuario-stat">
            <i data-lucide="map-pin"></i>
            <span>${u.gym}</span>
          </div>
          <div class="usuario-stat">
            <i data-lucide="dumbbell"></i>
            <span>${u.favorite}</span>
          </div>
          <div class="usuario-stat">
            <i data-lucide="activity"></i>
            <span>${u.workouts} entrenamientos</span>
          </div>
          <div class="usuario-stat">
            <i data-lucide="trophy"></i>
            <span>${u.achievements} logros</span>
          </div>
        </div>
      </div>
    </article>
  `).join('');
  lucide.createIcons();
}

// Tema
const tema = localStorage.getItem('apex_tema') || 'oscuro';
document.documentElement.setAttribute('data-tema', tema);

document.getElementById('boton-tema')?.addEventListener('click', () => {
  const actual = document.documentElement.getAttribute('data-tema');
  const nuevo = actual === 'oscuro' ? 'claro' : 'oscuro';
  document.documentElement.setAttribute('data-tema', nuevo);
  localStorage.setItem('apex_tema', nuevo);
});

// Cursor
(function() {
  const punto = document.getElementById('cursor-punto');
  if (!punto) return;
  if (window.matchMedia('(hover: none), (max-width: 820px)').matches) return;
  let raf;
  document.addEventListener('mousemove', e => {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      punto.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
    });
  });
  const sel = 'button, a, input';
  document.addEventListener('mouseover', e => { if (e.target.closest(sel)) document.body.classList.add('sobre-interactivo'); });
  document.addEventListener('mouseout',  e => { if (e.target.closest(sel)) document.body.classList.remove('sobre-interactivo'); });
})();

render();
</script>
</body>
</html>
